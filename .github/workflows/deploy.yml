name: Build and deploy calendar

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      LOOKBACK_DAYS: "30"
      LOOKAHEAD_DAYS: "180"
      EVENT_TITLE_MODE: "original"
      DEFAULT_EVENT_TITLE: "Busy"
      INCLUDE_LOCATION: "false"
      INCLUDE_DESCRIPTION: "false"
    steps:
      - uses: actions/checkout@v5
      - uses: actions/configure-pages@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: echo "::add-mask::${ICS_TOKEN}"
        env:
          ICS_TOKEN: ${{ secrets.ICS_TOKEN }}
      - run: python export.py
        env:
          CALDAV_URL: ${{ secrets.CALDAV_URL }}
          CALDAV_USERNAME: ${{ secrets.CALDAV_USERNAME }}
          CALDAV_PASSWORD: ${{ secrets.CALDAV_PASSWORD }}
          CALDAV_CALENDAR_NAME: ${{ secrets.CALDAV_CALENDAR_NAME }}
          ICS_TOKEN: ${{ secrets.ICS_TOKEN }}
      - uses: actions/upload-pages-artifact@v4
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
